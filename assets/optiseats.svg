<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&amp;family=Space+Mono&amp;display=swap');
      
      .bg {
        fill: #0d1117;
        stroke: #30363d;
        stroke-width: 1.5;
        rx: 12px;
      }
      
      .panel {
        fill: #161b22;
        stroke: #30363d;
        stroke-width: 1;
        rx: 8px;
      }
      
      .text-title {
        font-family: 'Space Grotesk', -apple-system, sans-serif;
        font-weight: 600;
        font-size: 16px;
        fill: #ffffff;
      }
      
      .text-body {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 12px;
        fill: #8b949e;
      }

      .text-mono {
        font-family: 'Space Mono', monospace;
        font-size: 10px;
        fill: #58a6ff;
        letter-spacing: 0.5px;
      }
      
      .seat-allocated {
        fill: #58a6ff;
        rx: 3px;
      }
      
      .seat-empty {
        fill: #21262d;
        rx: 3px;
      }
      
      .seat-buffer {
        fill: #0d1117;
        stroke: #30363d;
        stroke-dasharray: 2 2;
        rx: 3px;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="100%" height="100%" />

  <!-- Grid Decoration -->
  <line x1="30" y1="0" x2="30" y2="350" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4 4" />

  <!-- Top Nav Mockup -->
  <g transform="translate(50, 35)">
    <text class="text-mono" x="0" y="0">PROJECTS // OPTISEATS // SOLVER_ENGINE</text>
    <circle cx="520" cy="-4" r="4" fill="#58a6ff" />
  </g>

  <!-- Left Sidebar Panel: Seating Grid Layout -->
  <g transform="translate(50, 60)">
    <rect class="panel" width="220" height="250" />
    <text class="text-title" x="20" y="30">Exam Room Grid</text>
    <text class="text-body" x="20" y="50">Spacing Optimization</text>
    
    <!-- Seating Layout grid representation -->
    <g transform="translate(20, 75)">
      <!-- Row 1 -->
      <rect class="seat-allocated" x="0" y="0" width="16" height="16" />
      <rect class="seat-empty" x="24" y="0" width="16" height="16" />
      <rect class="seat-allocated" x="48" y="0" width="16" height="16" />
      <rect class="seat-empty" x="72" y="0" width="16" height="16" />
      <rect class="seat-allocated" x="96" y="0" width="16" height="16" />
      <rect class="seat-empty" x="120" y="0" width="16" height="16" />
      <rect class="seat-allocated" x="144" y="0" width="16" height="16" />
      
      <!-- Row 2 (Shifted empty blocks to represent buffer zone cheating prevention) -->
      <rect class="seat-empty" x="0" y="24" width="16" height="16" />
      <rect class="seat-allocated" x="24" y="24" width="16" height="16" />
      <rect class="seat-empty" x="48" y="24" width="16" height="16" />
      <rect class="seat-allocated" x="72" y="24" width="16" height="16" />
      <rect class="seat-empty" x="96" y="24" width="16" height="16" />
      <rect class="seat-allocated" x="120" y="24" width="16" height="16" />
      <rect class="seat-empty" x="144" y="24" width="16" height="16" />

      <!-- Row 3 -->
      <rect class="seat-allocated" x="0" y="48" width="16" height="16" />
      <rect class="seat-empty" x="24" y="48" width="16" height="16" />
      <rect class="seat-allocated" x="48" y="48" width="16" height="16" />
      <rect class="seat-empty" x="72" y="48" width="16" height="16" />
      <rect class="seat-allocated" x="96" y="48" width="16" height="16" />
      <rect class="seat-empty" x="120" y="48" width="16" height="16" />
      <rect class="seat-allocated" x="144" y="48" width="16" height="16" />

      <!-- Row 4 -->
      <rect class="seat-empty" x="0" y="72" width="16" height="16" />
      <rect class="seat-allocated" x="24" y="72" width="16" height="16" />
      <rect class="seat-empty" x="48" y="72" width="16" height="16" />
      <rect class="seat-allocated" x="72" y="72" width="16" height="16" />
      <rect class="seat-empty" x="96" y="72" width="16" height="16" />
      <rect class="seat-allocated" x="120" y="72" width="16" height="16" />
      <rect class="seat-empty" x="144" y="72" width="16" height="16" />
    </g>
    
    <!-- Legend -->
    <g transform="translate(20, 195)">
      <rect class="seat-allocated" x="0" y="0" width="10" height="10" />
      <text class="text-body" x="15" y="9" font-size="9">Allocated</text>
      
      <rect class="seat-empty" x="90" y="0" width="10" height="10" />
      <text class="text-body" x="105" y="9" font-size="9">Empty (Buffer)</text>
    </g>
    
    <text class="text-mono" x="20" y="235" fill="#8b949e">SOLVER STATUS: COMPLETE</text>
  </g>

  <!-- Right Top Panel: General stats -->
  <g transform="translate(290, 60)">
    <rect class="panel" width="260" height="115" />
    <text class="text-title" x="20" y="30">Solver Performance</text>
    
    <g transform="translate(20, 50)">
      <text class="text-body" x="0" y="15">Execution Time</text>
      <text class="text-mono" x="180" y="15">0.24 seconds</text>
      
      <text class="text-body" x="0" y="35">Constraint Satisfaction</text>
      <text class="text-mono" x="180" y="35" fill="#56d364">100% PASS</text>
      
      <text class="text-body" x="0" y="55">Optimization Score</text>
      <text class="text-mono" x="180" y="55">0.982 / 1.0</text>
    </g>
  </g>

  <!-- Right Bottom Panel: Room Info & Actions -->
  <g transform="translate(290, 195)">
    <rect class="panel" width="260" height="115" />
    <text class="text-title" x="20" y="30">Allocation Summary</text>
    
    <g transform="translate(20, 50)">
      <text class="text-body" x="0" y="15">Total Candidates</text>
      <text class="text-mono" x="180" y="15">420</text>
      
      <text class="text-body" x="0" y="35">Rooms Utilized</text>
      <text class="text-mono" x="180" y="35">12 halls</text>
      
      <text class="text-body" x="0" y="55">Generated Reports</text>
      <text class="text-mono" x="180" y="55" fill="#58a6ff">PDF / CSV (DOWNLOAD)</text>
    </g>
  </g>
</svg>
