<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&amp;family=Space+Mono&amp;display=swap');
      
      .bg {
        fill: #0d1117;
        stroke: #30363d;
        stroke-width: 1.5;
        rx: 12px;
      }
      
      .panel {
        fill: #161b22;
        stroke: #30363d;
        stroke-width: 1;
        rx: 8px;
      }
      
      .text-title {
        font-family: 'Space Grotesk', -apple-system, sans-serif;
        font-weight: 600;
        font-size: 16px;
        fill: #ffffff;
      }
      
      .text-body {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 12px;
        fill: #8b949e;
      }

      .text-mono {
        font-family: 'Space Mono', monospace;
        font-size: 10px;
        fill: #58a6ff;
        letter-spacing: 0.5px;
      }

      .indicator {
        fill: #56d364;
        fill-opacity: 0.15;
        stroke: #56d364;
        stroke-width: 1;
        rx: 6px;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="100%" height="100%" />

  <!-- Grid Decoration -->
  <line x1="30" y1="0" x2="30" y2="350" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4 4" />

  <!-- Top Nav Mockup -->
  <g transform="translate(50, 35)">
    <text class="text-mono" x="0" y="0">PROJECTS // MESSMETER // LIVE_METRICS</text>
    <circle cx="520" cy="-4" r="4" fill="#56d364" />
  </g>

  <!-- Left Sidebar Panel: Attendance -->
  <g transform="translate(50, 60)">
    <rect class="panel" width="220" height="250" />
    <text class="text-title" x="20" y="30">Meal Attendance</text>
    <text class="text-body" x="20" y="50">Today's Check-ins</text>
    
    <!-- Attendance gauge / large text -->
    <g transform="translate(20, 80)">
      <rect class="indicator" width="180" height="70" />
      <text class="text-title" x="15" y="35" font-size="24">94.2%</text>
      <text class="text-mono" x="15" y="55" fill="#56d364">482 / 512 STUDENTS</text>
    </g>
    
    <!-- Mini break-down metrics -->
    <g transform="translate(20, 170)">
      <text class="text-body" x="0" y="15">Breakfast</text>
      <text class="text-mono" x="130" y="15">142 synced</text>
      
      <text class="text-body" x="0" y="35">Lunch</text>
      <text class="text-mono" x="130" y="35">218 synced</text>
      
      <text class="text-body" x="0" y="55">Dinner</text>
      <text class="text-mono" x="130" y="55" fill="#8b949e">Pending</text>
    </g>
  </g>

  <!-- Right Top Panel: Food Rating / Feedback -->
  <g transform="translate(290, 60)">
    <rect class="panel" width="260" height="115" />
    <text class="text-title" x="20" y="30">Satisfaction Index</text>
    
    <g transform="translate(20, 50)">
      <text class="text-title" x="0" y="25" font-size="28">4.82<tspan font-size="14" fill="#8b949e"> / 5.00</tspan></text>
      <text class="text-body" x="0" y="45">Based on 320 submissions</text>
      
      <!-- Stars simulation -->
      <g transform="translate(140, 5)" fill="#58a6ff">
        <polygon points="10,1 12,7 18,7 13,11 15,17 10,13 5,17 7,11 2,7 8,7" />
        <polygon points="28,1 30,7 36,7 31,11 33,17 28,13 23,17 25,11 20,7 26,7" />
        <polygon points="46,1 48,7 54,7 49,11 51,17 46,13 41,17 43,11 38,7 44,7" />
        <polygon points="64,1 66,7 72,7 67,11 69,17 64,13 59,17 61,11 56,7 62,7" />
        <polygon points="82,1 84,7 90,7 85,11 87,17 82,13 77,17 79,11 74,7 80,7" fill="#30363d" />
      </g>
    </g>
  </g>

  <!-- Right Bottom Panel: Waste & Optimization -->
  <g transform="translate(290, 195)">
    <rect class="panel" width="260" height="115" />
    <text class="text-title" x="20" y="30">Waste Reduction</text>
    
    <g transform="translate(20, 55)">
      <!-- Line chart visual -->
      <path d="M 10 35 L 50 25 L 90 20 L 130 10 L 170 5" fill="none" stroke="#58a6ff" stroke-width="2" />
      <circle cx="10" cy="35" r="3" fill="#58a6ff" />
      <circle cx="50" cy="25" r="3" fill="#58a6ff" />
      <circle cx="90" cy="20" r="3" fill="#58a6ff" />
      <circle cx="130" cy="10" r="3" fill="#58a6ff" />
      <circle cx="170" cy="5" r="3" fill="#58a6ff" />
      
      <!-- Chart borders -->
      <line x1="10" y1="45" x2="170" y2="45" stroke="#30363d" stroke-width="1" />
      
      <text class="text-mono" x="10" y="58" font-size="8" fill="#8b949e">WK 1</text>
      <text class="text-mono" x="170" y="58" font-size="8" fill="#8b949e">WK 5</text>
      
      <!-- Stats -->
      <text class="text-mono" x="190" y="15" fill="#56d364">-18%</text>
      <text class="text-body" x="190" y="30" font-size="9">FOOD WASTE</text>
    </g>
  </g>
</svg>
