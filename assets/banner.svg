<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#161b22" />
      <stop offset="100%" stop-color="#0d1117" />
    </radialGradient>

    <!-- Text Fill Gradient -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#c9d1d9" />
      <stop offset="100%" stop-color="#58a6ff" />
    </linearGradient>

    <!-- Accent Line Gradient -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#30363d" stop-opacity="0" />
      <stop offset="30%" stop-color="#58a6ff" stop-opacity="1" />
      <stop offset="70%" stop-color="#58a6ff" stop-opacity="1" />
      <stop offset="100%" stop-color="#30363d" stop-opacity="0" />
    </linearGradient>

    <!-- Blueprint Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#30363d" stroke-width="0.5" stroke-opacity="0.3" />
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#30363d" stroke-width="0.25" stroke-opacity="0.15" />
    </pattern>

    <pattern id="dot-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.75" fill="#30363d" fill-opacity="0.4" />
    </pattern>

    <!-- Styles for Animations -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&amp;family=Space+Mono&amp;display=swap');

      .title {
        font-family: 'Space Grotesk', -apple-system, sans-serif;
        font-weight: 600;
        font-size: 52px;
        fill: url(#text-grad);
        letter-spacing: 4px;
      }

      .subtitle {
        font-family: 'Space Mono', monospace;
        font-size: 14px;
        fill: #8b949e;
        letter-spacing: 6px;
        text-transform: uppercase;
      }

      .philosophy {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 300;
        font-size: 13px;
        fill: #58a6ff;
        letter-spacing: 2px;
      }

      /* Glow effect animation */
      .particle {
        animation: float 8s ease-in-out infinite;
      }

      .particle-slow {
        animation: float 12s ease-in-out infinite alternate;
      }

      @keyframes float {
        0% { transform: translateY(0px) scale(1); opacity: 0.2; }
        50% { transform: translateY(-15px) scale(1.1); opacity: 0.6; }
        100% { transform: translateY(0px) scale(1); opacity: 0.2; }
      }

      /* Draw name animation */
      .draw-text {
        stroke: #ffffff;
        stroke-width: 1.5;
        stroke-dasharray: 800;
        stroke-dashoffset: 800;
        animation: draw 3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        fill: none;
      }

      .fill-text {
        opacity: 0;
        animation: fadeInText 1.5s ease-out 2.2s forwards;
      }

      @keyframes draw {
        to { stroke-dashoffset: 0; }
      }

      @keyframes fadeInText {
        to { opacity: 1; }
      }

      /* Draw lines */
      .draw-line {
        stroke-dasharray: 1000;
        stroke-dashoffset: 1000;
        animation: drawLine 2.5s cubic-bezier(0.4, 0, 0.2, 1) 0.5s forwards;
      }

      @keyframes drawLine {
        to { stroke-dashoffset: 0; }
      }

      /* Grid drift */
      .grid-bg {
        animation: gridDrift 60s linear infinite;
      }

      @keyframes gridDrift {
        from { transform: translate(0, 0); }
        to { transform: translate(40px, 40px); }
      }
    </style>
  </defs>

  <!-- Background Base -->
  <rect width="100%" height="100%" fill="url(#bg-glow)" />

  <!-- Animated Blueprint Grids -->
  <g class="grid-bg">
    <rect width="120%" height="120%" x="-10%" y="-10%" fill="url(#grid)" />
    <rect width="120%" height="120%" x="-10%" y="-10%" fill="url(#dot-grid)" />
  </g>

  <!-- Blueprint decorative line elements -->
  <line class="draw-line" x1="100" y1="50" x2="700" y2="50" stroke="#30363d" stroke-width="0.5" stroke-opacity="0.5" />
  <line class="draw-line" x1="100" y1="250" x2="700" y2="250" stroke="#30363d" stroke-width="0.5" stroke-opacity="0.5" />
  
  <!-- Blueprint tick marks / crosshairs -->
  <path d="M 95 50 L 105 50 M 100 45 L 100 55" stroke="#58a6ff" stroke-width="1" stroke-opacity="0.7" />
  <path d="M 695 50 L 705 50 M 700 45 L 700 55" stroke="#58a6ff" stroke-width="1" stroke-opacity="0.7" />
  <path d="M 95 250 L 105 250 M 100 245 L 100 255" stroke="#58a6ff" stroke-width="1" stroke-opacity="0.7" />
  <path d="M 695 250 L 705 250 M 700 245 L 700 255" stroke="#58a6ff" stroke-width="1" stroke-opacity="0.7" />

  <!-- Glowing Particles -->
  <circle class="particle" cx="150" cy="120" r="3" fill="#58a6ff" filter="blur(1px)" />
  <circle class="particle-slow" cx="620" cy="90" r="4" fill="#58a6ff" filter="blur(1px)" />
  <circle class="particle" cx="300" cy="220" r="2" fill="#8b949e" />
  <circle class="particle-slow" cx="500" cy="200" r="2.5" fill="#58a6ff" filter="blur(1px)" />
  
  <!-- Blueprint measurement tag text -->
  <text x="110" y="44" font-family="'Space Mono', monospace" font-size="8" fill="#8b949e" opacity="0.5">SCALE: 1:1</text>
  <text x="635" y="44" font-family="'Space Mono', monospace" font-size="8" fill="#8b949e" opacity="0.5">SYS_REF: JALAJ_GUPTA</text>

  <!-- Name Text: Animated stroke-dashoffset first, then fades in complete styling -->
  <g transform="translate(400, 130)">
    <!-- SVG Stroke Draw Name -->
    <text class="draw-text title" text-anchor="middle" y="0">JALAJ GUPTA</text>
    <!-- Rich filled text overlaying after draw animation -->
    <text class="fill-text title" text-anchor="middle" y="0">JALAJ GUPTA</text>
  </g>

  <!-- Underline under Name -->
  <rect class="draw-line" x="250" y="155" width="300" height="1" fill="url(#accent-grad)" />

  <!-- Subtitle and philosophy -->
  <text class="subtitle" x="400" y="195" text-anchor="middle">Product Engineer</text>
  <text class="philosophy" x="400" y="225" text-anchor="middle">// Idea → Architecture → Implementation → Launch</text>

</svg>
