<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&amp;family=Space+Mono&amp;display=swap');
      
      .quote-container {
        fill: #0d1117;
        stroke: #30363d;
        stroke-width: 1;
        rx: 8px;
      }
      
      .quote-text {
        font-family: 'Space Grotesk', -apple-system, sans-serif;
        font-weight: 300;
        font-size: 20px;
        fill: #ffffff;
        letter-spacing: 0.5px;
      }
      
      .quote-subtext {
        font-family: 'Space Mono', monospace;
        font-size: 11px;
        fill: #8b949e;
        letter-spacing: 2px;
      }

      .value-item {
        font-family: 'Space Mono', monospace;
        font-size: 10px;
        fill: #58a6ff;
        letter-spacing: 1px;
      }
    </style>
  </defs>

  <!-- Card Background -->
  <rect class="quote-container" width="100%" height="100%" />

  <!-- Grid line decoration -->
  <line x1="40" y1="0" x2="40" y2="160" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4 4" />
  
  <!-- Left Side: Engineering values -->
  <text x="60" y="50" class="quote-subtext">// PHILOSOPHY</text>
  <text x="60" y="95" class="quote-text">"Details matter. Good engineering is invisible."</text>
  
  <!-- Right Side or bottom values indicators -->
  <g transform="translate(60, 130)">
    <text x="0" y="0" class="value-item">BUILD PRODUCTS, NOT DEMOS</text>
    <circle cx="215" cy="-3" r="2" fill="#30363d" />
    <text x="230" y="0" class="value-item">SIMPLICITY IS A FEATURE</text>
    <circle cx="420" cy="-3" r="2" fill="#30363d" />
    <text x="435" y="0" class="value-item">CURIOSITY DRIVES INNOVATION</text>
  </g>
</svg>
