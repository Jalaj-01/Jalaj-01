<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&amp;display=swap');
      
      .terminal-window {
        fill: #0d1117;
        stroke: #30363d;
        stroke-width: 1.5;
        rx: 12px;
      }
      
      .header-bar {
        fill: #161b22;
        stroke: #30363d;
        stroke-width: 1;
      }
      
      .dot {
        r: 6px;
      }
      
      .dot-red { fill: #ff5f56; }
      .dot-yellow { fill: #ffbd2e; }
      .dot-green { fill: #27c93f; }
      
      .terminal-text {
        font-family: 'Fira Code', 'Space Mono', monospace;
        font-size: 13px;
        fill: #c9d1d9;
      }
      
      .prompt { fill: #58a6ff; font-weight: 500; }
      .cmd { fill: #ffffff; }
      .tag-info { fill: #8b949e; }
      .tag-success { fill: #56d364; }
      .tag-highlight { fill: #ff7b72; }
      .tag-bracket { fill: #6e7681; }
      
      .blink {
        animation: blink-anim 1s step-end infinite;
      }
      
      @keyframes blink-anim {
        50% { fill: transparent; }
      }
    </style>
  </defs>

  <!-- Window Frame -->
  <rect class="terminal-window" width="100%" height="100%" />
  
  <!-- Header Bar -->
  <path class="header-bar" d="M0,12 Q0,0 12,0 L788,0 Q800,0 800,12 L800,36 L0,36 Z" />
  
  <!-- Window Control Buttons -->
  <circle class="dot dot-red" cx="24" cy="18" />
  <circle class="dot dot-yellow" cx="44" cy="18" />
  <circle class="dot dot-green" cx="64" cy="18" />
  
  <text x="400" y="22" font-family="'Fira Code', monospace" font-size="11" fill="#8b949e" text-anchor="middle">terminal — guest@jalajgupta: ~</text>

  <!-- Terminal Content -->
  <g class="terminal-text" transform="translate(25, 60)">
    <!-- Command 1 -->
    <text x="0" y="0">
      <tspan class="prompt">jalajgupta@product-engine:~$ </tspan>
      <tspan class="cmd">npx prepos deploy --release</tspan>
    </text>
    
    <!-- Output 1 -->
    <text x="0" y="22">
      <tspan class="tag-bracket">[</tspan><tspan class="tag-info">info</tspan><tspan class="tag-bracket">]</tspan>
      <tspan> Initializing AI Mentor (ALLY) cognitive pipeline...</tspan>
    </text>
    <text x="0" y="40">
      <tspan class="tag-bracket">[</tspan><tspan class="tag-info">info</tspan><tspan class="tag-bracket">]</tspan>
      <tspan> Compiling collaborative notes and revision systems...</tspan>
    </text>
    <text x="0" y="58">
      <tspan class="tag-bracket">[</tspan><tspan class="tag-info">info</tspan><tspan class="tag-bracket">]</tspan>
      <tspan> Building offline database synchronization indexes...</tspan>
    </text>
    <text x="0" y="76">
      <tspan class="tag-bracket">[</tspan><tspan class="tag-success">success</tspan><tspan class="tag-bracket">]</tspan>
      <tspan fill="#ffffff"> PrepOS v2.4.0 bundled successfully (1.8s) → </tspan>
      <tspan fill="#58a6ff">https://theprepos.in</tspan>
    </text>

    <!-- Command 2 -->
    <text x="0" y="112">
      <tspan class="prompt">jalajgupta@product-engine:~$ </tspan>
      <tspan class="cmd">focusarena start --mode=deep-work</tspan>
    </text>
    
    <!-- Output 2 -->
    <text x="0" y="134">
      <tspan class="tag-bracket">[</tspan><tspan class="tag-info">info</tspan><tspan class="tag-bracket">]</tspan>
      <tspan> Synchronizing habits database on Vercel Edge networks...</tspan>
    </text>
    <text x="0" y="152">
      <tspan class="tag-bracket">[</tspan><tspan class="tag-success">ready</tspan><tspan class="tag-bracket">]</tspan>
      <tspan> Habit loops loaded. Session manager started on port 3000.</tspan>
    </text>

    <!-- Active Prompt -->
    <text x="0" y="188">
      <tspan class="prompt">jalajgupta@product-engine:~$ </tspan>
      <tspan class="cmd">_</tspan><rect x="250" y="176" width="8" height="15" fill="#ffffff" class="blink" />
    </text>
  </g>
</svg>
