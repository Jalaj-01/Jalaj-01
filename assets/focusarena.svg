<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&amp;family=Space+Mono&amp;display=swap');
      
      .bg {
        fill: #0d1117;
        stroke: #30363d;
        stroke-width: 1.5;
        rx: 12px;
      }
      
      .panel {
        fill: #161b22;
        stroke: #30363d;
        stroke-width: 1;
        rx: 8px;
      }
      
      .text-title {
        font-family: 'Space Grotesk', -apple-system, sans-serif;
        font-weight: 600;
        font-size: 16px;
        fill: #ffffff;
      }
      
      .text-body {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 12px;
        fill: #8b949e;
      }

      .text-mono {
        font-family: 'Space Mono', monospace;
        font-size: 10px;
        fill: #58a6ff;
        letter-spacing: 0.5px;
      }
      
      .timer-circle {
        fill: none;
        stroke: #21262d;
        stroke-width: 8;
      }
      
      .timer-progress {
        fill: none;
        stroke: #58a6ff;
        stroke-width: 8;
        stroke-linecap: round;
        stroke-dasharray: 283;
        stroke-dashoffset: 80;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="100%" height="100%" />

  <!-- Grid Decoration -->
  <line x1="30" y1="0" x2="30" y2="350" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4 4" />

  <!-- Top Nav Mockup -->
  <g transform="translate(50, 35)">
    <text class="text-mono" x="0" y="0">PROJECTS // FOCUSARENA // DEEP_WORK</text>
    <circle cx="520" cy="-4" r="4" fill="#58a6ff" />
  </g>

  <!-- Left Timer Panel -->
  <g transform="translate(50, 60)">
    <rect class="panel" width="220" height="250" />
    <text class="text-title" x="20" y="30">Active Focus</text>
    
    <!-- Pomodoro Circular Arc -->
    <g transform="translate(110, 120)">
      <circle class="timer-circle" r="45" />
      <circle class="timer-progress" r="45" transform="rotate(-90)" />
      <text font-family="'Space Mono', monospace" font-weight="600" font-size="16" fill="#ffffff" x="0" y="6" text-anchor="middle">24:12</text>
    </g>
    
    <!-- Status Text -->
    <text class="text-body" x="110" y="200" text-anchor="middle" font-size="11">Session 3 of 4</text>
    <text class="text-mono" x="110" y="225" text-anchor="middle" fill="#58a6ff">// STREAK ACTIVE</text>
  </g>

  <!-- Right Top Panel: Streak Tracker -->
  <g transform="translate(290, 60)">
    <rect class="panel" width="260" height="115" />
    <text class="text-title" x="20" y="30">Habit Streaks</text>
    
    <!-- Streak stats -->
    <g transform="translate(20, 50)">
      <text class="text-body" x="0" y="15">Daily Target</text>
      <text class="text-mono" x="190" y="15" fill="#56d364">24 DAYS</text>
      
      <!-- Mini calendar/grid representation -->
      <g transform="translate(0, 30)">
        <!-- Generate little streak squares -->
        <rect x="0" y="0" width="16" height="16" rx="3" fill="#238636" />
        <rect x="22" y="0" width="16" height="16" rx="3" fill="#238636" />
        <rect x="44" y="0" width="16" height="16" rx="3" fill="#238636" />
        <rect x="66" y="0" width="16" height="16" rx="3" fill="#39d353" />
        <rect x="88" y="0" width="16" height="16" rx="3" fill="#238636" />
        <rect x="110" y="0" width="16" height="16" rx="3" fill="#238636" />
        <rect x="132" y="0" width="16" height="16" rx="3" fill="#39d353" />
        <rect x="154" y="0" width="16" height="16" rx="3" fill="#238636" />
        <rect x="176" y="0" width="16" height="16" rx="3" fill="#0e4429" />
        <rect x="198" y="0" width="16" height="16" rx="3" fill="#39d353" />
      </g>
    </g>
  </g>

  <!-- Right Bottom Panel: Focus Analytics -->
  <g transform="translate(290, 195)">
    <rect class="panel" width="260" height="115" />
    <text class="text-title" x="20" y="30">Focus History (Hrs)</text>
    
    <!-- Mini bar chart -->
    <g transform="translate(20, 50)">
      <!-- Bars -->
      <rect x="10" y="15" width="14" height="35" rx="2" fill="#30363d" />
      <rect x="35" y="5" width="14" height="45" rx="2" fill="#30363d" />
      <rect x="60" y="20" width="14" height="30" rx="2" fill="#58a6ff" />
      <rect x="85" y="0" width="14" height="50" rx="2" fill="#58a6ff" />
      <rect x="110" y="12" width="14" height="38" rx="2" fill="#30363d" />
      <rect x="135" y="8" width="14" height="42" rx="2" fill="#58a6ff" />
      <rect x="160" y="3" width="14" height="47" rx="2" fill="#58a6ff" />
      
      <!-- Labels -->
      <text class="text-mono" x="12" y="65" font-size="8" fill="#8b949e">M</text>
      <text class="text-mono" x="37" y="65" font-size="8" fill="#8b949e">T</text>
      <text class="text-mono" x="62" y="65" font-size="8" fill="#8b949e">W</text>
      <text class="text-mono" x="87" y="65" font-size="8" fill="#8b949e">T</text>
      <text class="text-mono" x="112" y="65" font-size="8" fill="#8b949e">F</text>
      <text class="text-mono" x="137" y="65" font-size="8" fill="#8b949e">S</text>
      <text class="text-mono" x="162" y="65" font-size="8" fill="#8b949e">S</text>
      
      <!-- Stats on side -->
      <g transform="translate(190, 10)">
        <text class="text-mono" x="0" y="0" fill="#8b949e">TOTAL:</text>
        <text class="text-title" x="0" y="20" font-size="18">18.4h</text>
      </g>
    </g>
  </g>
</svg>
